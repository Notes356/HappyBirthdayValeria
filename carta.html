<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Para Valeria</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-color: #0f0c29;
            --card-bg: #fffcf5; 
            --text-color: #2c3e50;
            --accent-gold: #b8860b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://raw.githubusercontent.com/Notes356/HappyBirthdayValeria/562fa8c09ba5fda8d2ef9e6b07fe9d51eba685e8/Picsart_26-06-30_20-17-24-822.png');
            background-size: cover;
            background-position: center;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Cormorant Garamond', serif;
        }

        /* Estilo Retro-Pixel para la carta */
        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border: 4px solid #2c3e50;
            box-shadow: 8px 8px 0px #000;
            text-align: center;
            position: relative;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            color: #d81b60;
            font-size: 2.8rem;
            margin-bottom: 20px;
        }

        #typing-text {
            color: var(--text-color);
            font-size: 1.45rem;
            line-height: 1.6;
            text-align: left;
            min-height: 250px;
            white-space: pre-line;
        }

        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 2rem;
            color: var(--accent-gold);
            margin-top: 30px;
            text-align: right;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .controls {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* Botones estilo Pixel-UI */
        .btn-style {
            background: var(--card-bg);
            border: 3px solid var(--accent-gold);
            color: var(--accent-gold);
            font-family: 'Cormorant Garamond', serif;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        
        .btn-style:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        .btn-back { padding: 10px 25px; font-size: 1.2rem; }
        .btn-download { padding: 5px 15px; font-size: 0.9rem; border-color: #8a6a08; }

        .btn-style:hover { background: var(--accent-gold); color: white; }

        /* Botón de música pixel-art */
        .music-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #fff;
            border: 4px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            font-size: 1.5rem;
            box-shadow: 4px 4px 0px #000;
        }

        .music-toggle:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        @keyframes pulse-music {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .anim-pulse { animation: pulse-music 1s infinite; }
    </style>
</head>
<body>

    <div id="music-toggle" class="music-toggle anim-pulse">🎵</div>

    <audio id="bgMusic" loop>
        <source src="https://github.com/Notes356/HappyBirthdayValeria/raw/21dd4832228fb414328fb0108747c204d987d639/chill_background-sleeping-signal-chill-lofi-background-music-14973.mp3" type="audio/mpeg">
    </audio>

    <div class="card" id="capture">
        <h1>¡Feliz Cumpleaños!</h1>
        <div id="typing-text"></div>
        <div class="signature" id="signature">Con cariño, William</div>
        
        <div class="controls" id="controls">
            <button class="btn-style btn-back" onclick="window.location.href='index.html'">Volver</button>
            <button class="btn-style btn-download" id="download-btn">Guardar carta como imagen</button>
        </div>
    </div>

    <script>
        const message = `¡Feliz Cumpleaños, Vale!

Sé que has estado esperando este día, que para muchos representa la libertad y el comienzo de una nueva etapa llena de decisiones importantes.

Aunque nos conocemos hace poco, los días que he pasado contigo han sido realmente geniales. Aprecio mucho que hayas compartido esta etapa especial conmigo.

Me pareces una chica increíble, amable y divertida, y tengo muchas ganas de seguir descubriéndolo.

¡Disfruta hoy al máximo y ríe mucho!`;

        const textElement = document.getElementById('typing-text');
        const signature = document.getElementById('signature');
        const controls = document.getElementById('controls');
        const music = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('music-toggle');
        let index = 0;

        // Lógica de música
        musicToggle.addEventListener('click', () => {
            if (music.paused) {
                music.play();
                musicToggle.classList.remove('anim-pulse');
                musicToggle.textContent = "🔊";
            } else {
                music.pause();
                musicToggle.classList.add('anim-pulse');
                musicToggle.textContent = "🎵";
            }
        });

        function typeWriter() {
            if (index < message.length) {
                textElement.textContent += message.charAt(index);
                index++;
                setTimeout(typeWriter, 40);
            } else {
                signature.style.opacity = '1';
                controls.style.opacity = '1';
            }
        }

        document.getElementById('download-btn').addEventListener('click', function() {
            html2canvas(document.getElementById('capture'), {
                scale: 2,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Carta_para_Valeria.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });

        setTimeout(typeWriter, 1000);
    </script>
</body>
</html>
