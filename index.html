<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vale - 18</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff7eb9;
            --neon-blue: #7ee8fa;
            --bg-dark: #0f0c29;
        }
        
        * { 
            margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            width: 100vw; height: 100vh; overflow: hidden; 
            background: var(--bg-dark); 
            font-family: 'Press Start 2P', cursive;
            display: flex; justify-content: center; align-items: flex-end; 
            transition: transform 1s ease-in, opacity 1s ease-in;
        }

        .zoom-effect {
            transform: scale(3);
            opacity: 0;
        }

        #bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://raw.githubusercontent.com/Notes356/HappyBirthdayValeria/562fa8c09ba5fda8d2ef9e6b07fe9d51eba685e8/Picsart_26-06-30_20-05-39-028.png');
            background-size: cover; background-position: center;
            opacity: 0.6;
        }

        #particleCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        .counter-wrapper {
            position: relative; z-index: 5;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            border: 2px solid var(--neon-pink);
            padding: 20px 40px;
            text-align: center; 
            color: white;
            box-shadow: 0 0 20px rgba(255, 126, 185, 0.4);
            border-radius: 8px;
            margin-bottom: 120px; 
            animation: pulse 2s infinite;
            transition: all 0.1s ease;
            cursor: pointer;
        }

        .tap-feedback {
            transform: scale(0.95);
            box-shadow: 0 0 40px var(--neon-pink) !important;
            border-color: #fff !important;
        }

        #timer { 
            font-size: 2rem;
            text-shadow: 4px 4px var(--neon-blue);
            transition: text-shadow 0.3s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://raw.githubusercontent.com/Notes356/HappyBirthdayValeria/3598e596c0909e545e906865fabae47db973e1d5/bluelike_u-8-call-me-lofi-sleep-288752.mp3" type="audio/mpeg">
    </audio>

    <div id="bg-image"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="counter-wrapper" id="wrapper">
        <div id="timer">START</div>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bgMusic');
        let particles = [];
        let hasStarted = false;
        let count = 0;
        let interval;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.8;
                this.speedY = (Math.random() - 0.5) * 0.8;
                this.opacity = Math.random();
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        const timerEl = document.getElementById('timer');
        const wrapperEl = document.getElementById('wrapper');

        function updateCounter() {
            if (count < 18) {
                count++;
                timerEl.innerText = count;

                if (count >= 15) {
                    timerEl.style.textShadow = "0 0 20px var(--neon-blue), 0 0 40px var(--neon-pink)";
                    wrapperEl.style.animationDuration = "0.4s"; 
                }
            } else {
                clearInterval(interval);
                document.body.classList.add('zoom-effect');
                
                setTimeout(() => {
                    window.location.href = 'happybirthday.html';
                }, 1000);
            }
        }

        // Lógica de interacción
        wrapperEl.addEventListener('click', () => {
            wrapperEl.classList.add('tap-feedback');
            setTimeout(() => wrapperEl.classList.remove('tap-feedback'), 100);

            if (!hasStarted) {
                hasStarted = true;
                timerEl.style.fontSize = "3rem";
                timerEl.innerText = "0";
                audio.play();
                interval = setInterval(updateCounter, 1000);
            } else {
                // Esta parte permite apresurar el contador al tocar
                updateCounter();
            }
        });
    </script>
</body>
</html>
